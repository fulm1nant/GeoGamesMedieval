databases:
  - name: geogames-db
    databaseName: geogamesmedieval
    user: geogames
    plan: starter

services:
  - type: web
    name: GeoGamesMedieval
    env: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn GeoGamesMedieval.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: GeoGamesMedieval.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
    disk:
      name: media-data
      mountPath: /media
      sizeGB: 1